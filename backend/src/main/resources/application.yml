server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: dietista-landing-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/dietista}
    username: ${SPRING_DATASOURCE_USERNAME:dietista}
    password: ${SPRING_DATASOURCE_PASSWORD:dietista}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5500}
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
