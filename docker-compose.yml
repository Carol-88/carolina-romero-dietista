services:
  postgres:
    image: postgres:16-alpine
    container_name: dietista-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dietista
      POSTGRES_USER: dietista
      POSTGRES_PASSWORD: dietista
    ports:
      - "5433:5432"
    volumes:
      - dietista-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietista -d dietista"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: dietista-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dietista
      SPRING_DATASOURCE_USERNAME: dietista
      SPRING_DATASOURCE_PASSWORD: dietista
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,https://carol-88.github.io
    ports:
      - "8081:8080"

volumes:
  dietista-postgres-data:
